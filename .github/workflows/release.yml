name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0). Leave empty to auto-detect from cjpm.toml.'
        required: false
        default: ''
      prerelease:
        description: 'Is this a pre-release?'
        required: true
        type: boolean
        default: false

env:
  CANGJIE_VERSION: 1.0.5

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dependencies (Linux)
        if: runner.os == 'Linux'
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libfreetype6-dev libgl1-mesa-dev libudev-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev nasm patchelf
          version: 1.0
          execute_install_scripts: true

      - name: Setup Cangjie
        uses: Zxilly/setup-cangjie@v2.1.1
        with:
          channel: lts
          version: ${{ env.CANGJIE_VERSION }}
          archive-path: ./cangjie-archive

      - name: Download Prebuilt SFML (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://www.sfml-dev.org/files/SFML-3.0.2-windows-vc17-64-bit.zip" -OutFile "SFML.zip"
          Expand-Archive -Path "SFML.zip" -DestinationPath "."
          Move-Item "SFML-3.0.2" "SFML-Prebuilt"

      - name: Download Prebuilt CSFML (Windows)
        if: runner.os == 'Windows'
        run: |
          Invoke-WebRequest -Uri "https://www.sfml-dev.org/files/CSFML-3.0.0-windows-64-bit.zip" -OutFile "CSFML.zip"
          Expand-Archive -Path "CSFML.zip" -DestinationPath "."
          Move-Item "CSFML" "CSFML-Prebuilt"

      - name: Populate ./csfml (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p csfml
          cp SFML-Prebuilt/bin/sfml-audio-3.dll csfml/
          cp SFML-Prebuilt/bin/sfml-graphics-3.dll csfml/
          cp SFML-Prebuilt/bin/sfml-system-3.dll csfml/
          cp SFML-Prebuilt/bin/sfml-window-3.dll csfml/
          cp CSFML-Prebuilt/bin/csfml-audio-3.dll csfml/
          cp CSFML-Prebuilt/bin/csfml-graphics-3.dll csfml/
          cp CSFML-Prebuilt/bin/csfml-system-3.dll csfml/
          cp CSFML-Prebuilt/bin/csfml-window-3.dll csfml/
          cp CSFML-Prebuilt/lib/gcc/libcsfml-audio.a csfml/
          cp CSFML-Prebuilt/lib/gcc/libcsfml-graphics.a csfml/
          cp CSFML-Prebuilt/lib/gcc/libcsfml-system.a csfml/
          cp CSFML-Prebuilt/lib/gcc/libcsfml-window.a csfml/
          ls -R csfml

      - name: Download SFML and CSFML Source (Linux)
        if: runner.os == 'Linux'
        run: |
          curl -L "https://github.com/SFML/SFML/archive/refs/tags/3.0.2.tar.gz" -o SFML-Source.tar.gz
          tar -xzf SFML-Source.tar.gz
          mv SFML-3.0.2 sfml-src

          curl -L "https://github.com/SFML/CSFML/archive/refs/tags/3.0.0.tar.gz" -o CSFML-Source.tar.gz
          tar -xzf CSFML-Source.tar.gz
          mv CSFML-3.0.0 csfml-src

      - name: Build SFML (Linux)
        if: runner.os == 'Linux'
        run: |
          cd sfml-src
          sed -i '/set_target_properties(${target} PROPERTIES SOVERSION/d' cmake/Macros.cmake
          sed -i '/set_target_properties(${target} PROPERTIES VERSION/d' cmake/Macros.cmake
          cmake -G Ninja -B build \
            -DBUILD_SHARED_LIBS=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/sfml-install \
            -DSFML_BUILD_EXAMPLES=OFF \
            -DSFML_BUILD_NETWORK=FALSE \
            -DSFML_BUILD_TEST_SUITE=OFF \
            -DSFML_USE_SYSTEM_DEPS=OFF
          cmake --build build --target install
          cd ..

      - name: Build CSFML (Linux)
        if: runner.os == 'Linux'
        run: |
          cd csfml-src
          sed -i '/set_target_properties(${target} PROPERTIES SOVERSION/d' cmake/Macros.cmake
          sed -i '/set_target_properties(${target} PROPERTIES VERSION/d' cmake/Macros.cmake
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/csfml-install \
            -DCSFML_BUILD_EXAMPLES=OFF \
            -DCSFML_BUILD_NETWORK=FALSE \
            -DCSFML_BUILD_TEST_SUITE=OFF \
            -DCSFML_LINK_SFML_STATICALLY=OFF \
            -DNO_VERSIONED_SO=ON \
            -DSFML_ROOT=${{ github.workspace }}/sfml-install
          cmake --build build --target install
          cd ..

      - name: Populate ./csfml (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p csfml
          cp -r sfml-install/lib/*.so* csfml/
          cp -r csfml-install/lib/*.so* csfml/
          patchelf --set-rpath '$ORIGIN' csfml/libcsfml-*.so*
          patchelf --set-rpath '$ORIGIN' csfml/libsfml-*.so*
          ls -R csfml

      - name: Set Output Variables
        id: vars
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            echo "OS_DIR=linux_x86_64_cjnative" >> $GITHUB_OUTPUT
            echo "ARTIFACT_NAME=linux-x64" >> $GITHUB_OUTPUT
          else
            echo "OS_DIR=windows_x86_64_cjnative" >> $GITHUB_OUTPUT
            echo "ARTIFACT_NAME=windows-x64" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Prepare Root Files
        run: |
          mkdir -p staging/${{ steps.vars.outputs.OS_DIR }}/static/${{ github.event.repository.name }}
          mkdir -p staging/${{ steps.vars.outputs.OS_DIR }}/dynamic/${{ github.event.repository.name }}

          if [ -f "README.md" ]; then cp README.md staging/${{ steps.vars.outputs.OS_DIR }}/; fi
          if [ -f "License.txt" ]; then cp License.txt staging/${{ steps.vars.outputs.OS_DIR }}/; fi
        shell: bash

      - name: Build Static
        run: |
          if [ -f "cjpm-release-static.toml" ]; then
            cp cjpm-release-static.toml cjpm.toml
          else
            echo "Error: cjpm-release-static.toml not found!"
            exit 1
          fi
          rm -rf target
          cjpm build
        shell: bash

      - name: Stage Static Artifacts
        run: |
          DEST_DIR="staging/${{ steps.vars.outputs.OS_DIR }}/static/${{ github.event.repository.name }}"
          mkdir -p "$DEST_DIR"

          # Copy Cangjie Build Output
          find target/release/${{ github.event.repository.name }} -type f ! -name 'incremental-cache.json' -exec cp {} "$DEST_DIR/" \;

          # Copy csfml libs
          cp -r csfml/. "$DEST_DIR/"

          # Copy Dependencies
          PARENT_DIR=$(dirname "$DEST_DIR")
          for dep_dir in target/release/*/; do
            DEP_NAME=$(basename "$dep_dir")
            if [ "$DEP_NAME" != "${{ github.event.repository.name }}" ]; then
              echo "Processing dependency: $DEP_NAME"
              mkdir -p "$PARENT_DIR/$DEP_NAME"
              find "$dep_dir" -name "*.cjo" -exec cp {} "$PARENT_DIR/$DEP_NAME/" \;
            fi
          done
        shell: bash

      - name: Build Dynamic
        run: |
          if [ -f "cjpm-release-dynamic.toml" ]; then
            cp cjpm-release-dynamic.toml cjpm.toml
          else
            echo "Error: cjpm-release-dynamic.toml not found!"
            exit 1
          fi
          rm -rf target
          cjpm build
        shell: bash

      - name: Stage Dynamic Artifacts
        run: |
          DEST_DIR="staging/${{ steps.vars.outputs.OS_DIR }}/dynamic/${{ github.event.repository.name }}"
          mkdir -p "$DEST_DIR"

          # Copy Cangjie Build Output
          find target/release/${{ github.event.repository.name }} -type f ! -name 'incremental-cache.json' -exec cp {} "$DEST_DIR/" \;

          # Copy csfml libs
          cp -r csfml/. "$DEST_DIR/"

          # Copy Dependencies
          PARENT_DIR=$(dirname "$DEST_DIR")
          for dep_dir in target/release/*/; do
            DEP_NAME=$(basename "$dep_dir")
            if [ "$DEP_NAME" != "${{ github.event.repository.name }}" ]; then
              echo "Processing dependency: $DEP_NAME"
              mkdir -p "$PARENT_DIR/$DEP_NAME"
              find "$dep_dir" -name "*.cjo" -exec cp {} "$PARENT_DIR/$DEP_NAME/" \;
            fi
          done
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.vars.outputs.OS_DIR }}
          path: staging/${{ steps.vars.outputs.OS_DIR }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Version
        id: version
        run: |
          INPUT_VER="${{ github.event.inputs.version }}"
          if [ -z "$INPUT_VER" ]; then
            RAW_VER=$(grep -Po '(?m)^\s*version\s*=\s*"\K[^"]+' cjpm.toml)
            if [ -z "$RAW_VER" ]; then
              echo "Error: Could not detect version from cjpm.toml"
              exit 1
            fi
            if [[ "$RAW_VER" != v* ]]; then
              RAW_VER="v$RAW_VER"
            fi
            echo "VERSION=$RAW_VER" >> $GITHUB_OUTPUT
            echo "Detected version: $RAW_VER"
          else
            echo "VERSION=$INPUT_VER" >> $GITHUB_OUTPUT
            echo "Using input version: $INPUT_VER"
          fi
        shell: bash

      - name: Download All Artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare Release Assets
        id: assets
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          CLEAN_VERSION="${VERSION#v}"
          for dir in artifacts/*/; do
            FOLDER_NAME=$(basename "$dir")
            if [ "$FOLDER_NAME" == "linux_x86_64_cjnative" ]; then
              ARTIFACT_SUFFIX="linux-x64"
            elif [ "$FOLDER_NAME" == "windows_x86_64_cjnative" ]; then
              ARTIFACT_SUFFIX="windows-x64"
            else
              continue
            fi
            ZIP_NAME="${{ github.event.repository.name }}-${ARTIFACT_SUFFIX}-${CLEAN_VERSION}.zip"
            (cd artifacts && zip -r "../$ZIP_NAME" "$FOLDER_NAME")
          done
          echo "Generated files:"
          ls -l *.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ github.event.repository.name }} ${{ steps.version.outputs.VERSION }}
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          generate_release_notes: true
          body: |
            ## Build Info
            **Cangjie Version**: ${{ env.CANGJIE_VERSION }}
          files: |
            *.zip
